{% extends "base.html" %}
{% block content %}
<div class="row">
  <div class="col-md-3">
    <div class="list-group">
      <a href="{{ url_for('dashboard') }}" class="list-group-item list-group-item-action active">Dashboard</a>
      <a href="{{ url_for('teachers') }}" class="list-group-item list-group-item-action">Manage Teachers</a>
      <a href="{{ url_for('subjects') }}" class="list-group-item list-group-item-action">Manage Subjects</a>
      <a href="{{ url_for('rooms') }}" class="list-group-item list-group-item-action">Manage Rooms</a>
      <a href="{{ url_for('timetable_view') }}" class="list-group-item list-group-item-action">View Timetable</a>
    </div>
  </div>

  <div class="col-md-9">
    <div class="card shadow-sm">
      <div class="card-body">
        <h4>Welcome, {{ current_user.username }}</h4>
        <p class="text-muted">Use the left menu to manage Teachers, Subjects, Rooms, and to generate/optimize timetable.</p>

        <div class="row gy-2">
          <div class="col-sm-6">
            <form method="post" action="{{ url_for('generate') }}">
              <div class="input-group">
                <input name="max_per_day" type="number" min="1" class="form-control" placeholder="Max classes per teacher per day" value="3">
                <button class="btn btn-success">⚙️ Generate Timetable</button>
              </div>
            </form>
          </div>
          <div class="col-sm-6">
            <form method="post" action="{{ url_for('optimize') }}">
              <button class="btn btn-warning">🧠 AI Optimize</button>
            </form>
          </div>
        </div>

      </div>
    </div>
  </div>
</div>
{% endblock %}
